name: Build and Release Executables

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-executables-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            pack_script: pack-win
            artifact_name: atari-portal-windows
            artifact_path: release/*-win-x64.zip
          - platform: macos
            os: macos-latest
            pack_script: pack-mac
            artifact_name: atari-portal-macos
            artifact_path: release/*.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run ${{ matrix.pack_script }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Prepare release tag
        id: release_tag
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          echo "tag=auto-${GITHUB_RUN_NUMBER}-${short_sha}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Atari Portal ${{ github.run_number }}
          target_commitish: ${{ github.sha }}
          files: release-assets/*
          generate_release_notes: true
